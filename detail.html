<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✦ 项目详情 - 作品集</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/filter-detail.css">
</head>
<body>
  <!-- 注: 星空画布由 starfield.js 自动创建 -->

  <nav class="nav-bar">
    <div class="container nav-inner">
      <a href="/" class="nav-logo glow-text">✦ PORTFOLIO</a>
      <div class="nav-links">
        <a href="/">← 返回首页</a>
      </div>
    </div>
  </nav>

  <main class="project-detail" id="detailRoot">
    <div class="loading" id="detailLoading">
      <div class="spinner"></div>
      <p style="margin-top:16px;color:var(--text-muted);">加载星际数据中...</p>
    </div>

    <div id="detailContent" style="display:none;"></div>

    <div class="empty-state" id="detailError" style="display:none;">
      <div class="empty-icon">😅</div>
      <p>作品不存在或加载失败</p>
      <a href="/" class="btn-glow" style="text-decoration:none;display:inline-block;margin-top:16px;">← 返回首页</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-glow-line"></div>
    <p>✦ <span id="footerYear">2024</span> 个人作品集</p>
  </footer>

  <script src="js/starfield.js"></script>
  <script src="js/api.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>
